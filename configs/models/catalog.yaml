models:
  - name: general-chat
    version: "1.0.0"
    family: qwen
    engine: vllm
    capabilities:
      - chat
      - reasoning
      - summarization
      - tool_calling
    vllm_eagle_head: "yuhuili/EAGLE-Qwen2.5-7B-Instruct"
    memory_requirement_gb: 16
    ownership: platform
    status: registered
  - name: embedding-service
    version: "1.0.0"
    family: mistral
    engine: huggingface-transformers
    capabilities:
      - embedding
      - classification
    memory_requirement_gb: 12
    ownership: platform
    status: registered
